<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="100%" x2="20%" y2="0%">
      <stop offset="0%" style="stop-color:rgb(120,120,120);stop-opacity:1"/>
      <stop offset="100%" style="stop-color:rgb(240,240,240);stop-opacity:1"/>
    </linearGradient>
    <radialGradient
      id="grad2"
      cx="50%"
      cy="50%"
      r="30%"
    >
      <stop
        offset="0%"
        stop-color="#fff9"
      />
      <stop
        offset="100%"
        stop-color="#fff0"
      />
    </radialGradient>
    <radialGradient id="fire">
      <stop offset="30%" stop-color="#ff0b"/>
      <stop offset="65%" stop-color="#f007"/>
      <stop offset="10%" stop-color="#0000"/>
    </radialGradient>
  </defs>
  <g
    transform=""
  >
    <circle
      cx="40"
      cy="65"
      r="30"
      fill="url(#grad1)"
    />
    <path
      d="M40 30 Q50 15, 64 33"
      stroke="url(#grad2)"
      stroke-width="20"
      stroke-linejoin="round"
      fill-opacity="0"
      transform="rotate(31 70 10) translate(-19 4) scale(1.8)"
    />
  </g>
  <g
    transform="rotate(7 40 65) translate(0 0)"
  >
    <rect x="10" y="10" width="30" height="30" rx="3" ry="3"
          style="clip-path: polygon(0 0, 100% 0, 100% 50%, 60% 45%, 30% 45%, 0 50%);"
          fill="url(#grad1)"
          transform="rotate(15 50 50) translate(20 20)"
    />

    <path
      d="M51 29 Q50 17, 62 8"
      stroke="#222"
      stroke-width="5"
      fill-opacity="0"
    />

    <!--    <rect-->
    <!--      x="46"-->
    <!--      y="34"-->
    <!--      width="24"-->
    <!--      height="24"-->
    <!--      transform="rotate(15 70 10)"-->
    <!--      fill="url(#grad1)"-->
    <!--      style="border-radius:10"/>-->
  </g>

</svg>
